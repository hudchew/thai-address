name: Data Validation & Optimization

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check_and_minify:
    runs-on: ubuntu-latest
    permissions:
      contents: write # เพื่อให้หุ่นยนต์มีสิทธิ์เขียนไฟล์กลับเข้า Git ได้ครับ

    steps:
      - uses: actions/checkout@v4
        with:
          # ดึงข้อมูลแบบเต็มมาเพื่อให้ git ทำงานได้ถูกต้อง
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate Data
        run: npm run validate

      - name: Minify Data
        run: npm run minify

      - name: Commit & Push changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # เช็กว่ามีไฟล์เปลี่ยนแปลงไหม
          if [ -n "$(git status --porcelain)" ]; then
            echo "✨ พบการเปลี่ยนแปลง! กำลังบันทึกไฟล์ Minified กลับเข้าโปรเจค..."
            git add thailand-address-bilingual.min.json
            git commit -m "chore: auto-minify address data [skip ci]"
            git push
          else
            echo "✅ ไม่มีอะไรเปลี่ยนแปลง ไม่ต้องบันทึกเพิ่มครับ"
          fi
